<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>
    {% if page.title %}
      {{ page.title }} | IVA
    {% else %}
      IVA
    {% endif %}
  </title>

  <meta
    name="description"
    content="{{ page.description | default: site.description }}"
  >

  <meta
    name="robots"
    content="{{ page.robots | default: 'index,follow,max-image-preview:large' }}"
  >

  <meta
    name="author"
    content="Evan Foster"
  >

  <meta
    property="og:locale"
    content="en_US"
  >

  <meta
    property="og:type"
    content="website"
  >

  <meta
    property="og:site_name"
    content="IVA"
  >

  <meta
    property="og:title"
    content="{% if page.title %}{{ page.title }} | IVA{% else %}IVA{% endif %}"
  >

  <meta
    property="og:description"
    content="{{ page.description | default: site.description }}"
  >

  <meta
    property="og:url"
    content="{{ site.url }}{{ page.url }}"
  >

  <meta
    property="og:image"
    content="{{ site.url }}{{ page.image | default: '/assets/images/social-preview.png' }}"
  >

  <meta
    property="og:image:width"
    content="1200"
  >

  <meta
    property="og:image:height"
    content="630"
  >

  <meta
    property="og:image:type"
    content="image/png"
  >

  <meta
    property="og:image:alt"
    content="IVA - organizational value made visible"
  >

  <meta
    name="twitter:card"
    content="summary_large_image"
  >

  <meta
    name="twitter:title"
    content="{% if page.title %}{{ page.title }} | IVA{% else %}IVA{% endif %}"
  >

  <meta
    name="twitter:description"
    content="{{ page.description | default: site.description }}"
  >

  <meta
    name="twitter:image"
    content="{{ site.url }}{{ page.image | default: '/assets/images/social-preview.png' }}"
  >

  <link
    rel="canonical"
    href="{{ site.url }}{{ page.url }}"
  >

  <link
    rel="stylesheet"
    href="{{ '/assets/css/style.css' | relative_url }}"
  >

  <link
    rel="icon"
    type="image/x-icon"
    href="{{ '/assets/images/favicon.ico' | relative_url }}"
  >

  <link
    rel="icon"
    type="image/png"
    sizes="32x32"
    href="{{ '/assets/images/favicon-32x32.png' | relative_url }}"
  >

  <link
    rel="apple-touch-icon"
    sizes="180x180"
    href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}"
  >

  <meta name="theme-color" content="#1F2A44">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  {% include schema.html %}
</head>

<body>
  <a class="skip-link" href="#main-content">Skip to content</a>

  {% include header.html %}

  <main id="main-content">
    {{ content }}
  </main>

  {% include footer.html %}

  <script src="{{ '/assets/js/header.js' | relative_url }}"></script>
</body>
</html>
